<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Hunt - Domanda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 174, 239, 0.2);
            border-top: 4px solid #00aeef;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { font-size: 1.2rem; color: #00aeef; }
        .error { color: #ff4444; }

        /* Sezione Quiz */
        #quiz-section {
            display: none;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102, 45, 145, 0.4);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }
        #quiz-section h2 {
            color: #00aeef;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .question-counter {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        #quiz-question {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            text-align: left;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 174, 239, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
        }
        .option-btn:hover {
            border-color: rgba(0, 174, 239, 0.5);
            background: rgba(0, 174, 239, 0.08);
        }
        .option-btn.selected {
            border-color: #00aeef;
            background: rgba(0, 174, 239, 0.15);
            box-shadow: 0 0 15px rgba(0, 174, 239, 0.2);
        }
        .option-btn.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
        }
        .option-btn.wrong {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.15);
        }
        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00aeef, #662d91);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }
        .confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .confirm-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 174, 239, 0.3);
        }
        .feedback {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-size: 1rem;
        }
        .feedback.correct {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
        }
        .feedback.wrong {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff4444;
        }

        #error-state {
            display: none;
        }
    </style>
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="container">
        <div id="loading-state">
            <div class="loader"></div>
            <p class="message">Caricamento domanda...</p>
        </div>

        <div id="quiz-section">
            <h2>🎯 Sfida QR!</h2>
            <p class="question-counter">Domanda <span id="q-num">1</span> di <span id="q-total">5</span></p>
            <p id="quiz-question"></p>
            <div class="options-grid" id="options-grid"></div>
            <button class="confirm-btn" id="confirm-btn" onclick="confermaRisposta()">Conferma Risposta</button>
            <div class="feedback" id="feedback"></div>
        </div>

        <div id="error-state">
            <p class="message error">❌ QR Code non valido o già utilizzato.</p>
        </div>
    </div>

    <script>
        const DEBUG = false;
        const LS_KEY = 'its_hunt_2026_openday';

        const QUIZ = {
            "0": {
                question: "In quale anno è stato fondato l'ITS Roberto Rossellini?",
                options: ["2010", "2012", "2015", "2018"],
                answer: 1
            },
            "1": {
                question: "In quale settore tecnologico forma principalmente l'ITS Rossellini?",
                options: ["Biotecnologie", "Cinema e Audiovisivo", "Cybersecurity e ICT", "Energie Rinnovabili"],
                answer: 2
            },
            "2": {
                question: "Dove si trova la sede principale dell'ITS Rossellini?",
                options: ["Milano", "Napoli", "Roma", "Torino"],
                answer: 2
            },
            "3": {
                question: "Cosa significa l'acronimo ITS?",
                options: [
                    "Istituto Tecnico Superiore",
                    "Istituto di Tecnologia e Scienza",
                    "Istituto Tecnico Sperimentale",
                    "Istituto di Training Specializzato"
                ],
                answer: 0
            },
            "4": {
                question: "A quale figura del cinema italiano è dedicato l'istituto?",
                options: ["Federico Fellini", "Sergio Leone", "Roberto Rossellini", "Luchino Visconti"],
                answer: 2
            }
        };

        const KEYS = {
            "0": "k9mP2xQv",
            "1": "Lw7nR4tY",
            "2": "Bj3hF8sD",
            "3": "Za5eW1qU",
            "4": "Xc6gV0iO"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const pos = urlParams.get('pos');
        const key = urlParams.get('key');

        let selectedOption = null;

        function validaKey(position, token) {
            return KEYS[position] === token;
        }

        function getProgress() {
            return JSON.parse(localStorage.getItem(LS_KEY)) || {};
        }

        function salvaRisposta(position) {
            let progress = getProgress();
            progress[position] = true;
            localStorage.setItem(LS_KEY, JSON.stringify(progress));
        }

        function domandaGiaRisolta(position) {
            return getProgress().hasOwnProperty(position);
        }

        function mostraErrore() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            setTimeout(() => {
                window.location.replace(new URL('index.html', window.location.href).href);
            }, 3000);
        }

        function mostraDomanda() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';

            const quizData = QUIZ[pos];
            const totalQuestions = Object.keys(QUIZ).length;
            const qIndex = parseInt(pos) + 1;

            document.getElementById('q-num').textContent = qIndex;
            document.getElementById('q-total').textContent = totalQuestions;
            document.getElementById('quiz-question').textContent = quizData.question;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            quizData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selezionaOpzione(idx, btn);
                grid.appendChild(btn);
            });
        }

        function selezionaOpzione(index, btnElement) {
            selectedOption = index;

            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');

            const confirmBtn = document.getElementById('confirm-btn');
            confirmBtn.classList.add('active');

            document.getElementById('feedback').style.display = 'none';
        }

        function confermaRisposta() {
            if (selectedOption === null) return;

            const quizData = QUIZ[pos];
            const feedback = document.getElementById('feedback');
            const confirmBtn = document.getElementById('confirm-btn');

            if (selectedOption === quizData.answer) {
                salvaRisposta(pos);

                document.querySelectorAll('.option-btn')[selectedOption].classList.add('correct');

                feedback.className = 'feedback correct';
                feedback.textContent = '✅ Corretto! Vai alla dashboard per continuare.';
                feedback.style.display = 'block';

                confirmBtn.style.display = 'none';

                setTimeout(() => {
                    window.location.replace(new URL('index.html', window.location.href).href);
                }, 2000);
            } else {
                document.querySelectorAll('.option-btn')[selectedOption].classList.add('wrong');

                feedback.className = 'feedback wrong';
                feedback.textContent = '❌ Risposta errata. Riprova!';
                feedback.style.display = 'block';

                selectedOption = null;
                confirmBtn.classList.remove('active');

                setTimeout(() => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.classList.remove('selected', 'wrong');
                    });
                    feedback.style.display = 'none';
                }, 1500);
            }
        }

        if (pos === null || key === null || !validaKey(pos, key)) {
            mostraErrore();
        } else {
            const posInt = parseInt(pos);

            if (isNaN(posInt) || posInt < 0 || posInt >= Object.keys(QUIZ).length) {
                mostraErrore();
            } else if (domandaGiaRisolta(pos)) {
                window.location.replace(new URL('index.html', window.location.href).href);
            } else {
                setTimeout(mostraDomanda, 600);
            }
        }
    </script>
</body>
</html>
