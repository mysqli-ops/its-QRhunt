<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Hunt - Domanda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 550px;
            width: 100%;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 174, 239, 0.2);
            border-top: 4px solid #00aeef;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { font-size: 1.2rem; color: #00aeef; }
        .error { color: #ff4444; }

        #quiz-section {
            display: none;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102, 45, 145, 0.4);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }
        #quiz-section .category-tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(0,174,239,0.2), rgba(102,45,145,0.2));
            border: 1px solid rgba(0,174,239,0.3);
            color: #00aeef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        #quiz-section h2 {
            color: #00aeef;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .question-counter {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        #quiz-question {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            text-align: left;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 174, 239, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
        }
        .option-btn:hover {
            border-color: rgba(0, 174, 239, 0.5);
            background: rgba(0, 174, 239, 0.08);
        }
        .option-btn.selected {
            border-color: #00aeef;
            background: rgba(0, 174, 239, 0.15);
            box-shadow: 0 0 15px rgba(0, 174, 239, 0.2);
        }
        .option-btn.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
        }
        .option-btn.wrong {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.15);
        }
        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00aeef, #662d91);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }
        .confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .confirm-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 174, 239, 0.3);
        }
        .feedback {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-size: 1rem;
        }
        .feedback.correct {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
        }
        .feedback.wrong {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff4444;
        }

        #error-state { display: none; }
    </style>
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="container">
        <div id="loading-state">
            <div class="loader"></div>
            <p class="message">Caricamento domanda...</p>
        </div>

        <div id="quiz-section">
            <div class="category-tag" id="category-tag">Categoria</div>
            <h2>🎯 Sfida QR!</h2>
            <p class="question-counter">Domanda <span id="q-num">1</span> di <span id="q-total">12</span></p>
            <p id="quiz-question"></p>
            <div class="options-grid" id="options-grid"></div>
            <button class="confirm-btn" id="confirm-btn" onclick="confermaRisposta()">Conferma Risposta</button>
            <div class="feedback" id="feedback"></div>
        </div>

        <div id="error-state">
            <p class="message error">❌ QR Code non valido o già utilizzato.</p>
        </div>
    </div>

    <script>
        const DEBUG = false;
        const LS_KEY = 'its_hunt_2026_openday';
        const TOTAL_QUESTIONS = 12;
        const WIN_THRESHOLD = 10;

        const QUIZ = {
            "0": { category: "Produzione", question: "Quale dei seguenti documenti NON serve a capire quando e/o dove si gira una scena?", options: ["Contratto attori", "Piano riprese", "Lista catering", "Sceneggiatura"], answer: 2 },
            "1": { category: "Produzione", question: "Quale figura si occupa di organizzare budget, troupe e tempi di produzione di un film o programma TV?", options: ["Regista", "Montatore", "Produttore", "Scenografo"], answer: 2 },
            "2": { category: "Produzione", question: "Cosa significa l'acronimo ODG (documento tecnico della produzione con le indicazioni logistiche del set)?", options: ["Organizzazione Dati Generali", "Ordine Del Giorno", "Obiettivo Di Girato", "Operatore Di Grafica"], answer: 1 },
            "3": { category: "Sound", question: 'Chi ha composto le musiche del film "Il Buono, Il Brutto ed il Cattivo"?', options: ["Ennio Morricone", "Nino Rota", "Hans Zimmer", "John Williams"], answer: 0 },
            "4": { category: "Sound", question: "Chi crea effetti sonori come passi, pioggia o porte che cigolano?", options: ["Cameraman", "Foley Artist", "Stuntman", "Aiuto Regista"], answer: 1 },
            "5": { category: "Videomaker", question: 'Un bravo videomaker deve conoscere la "Regola dei Terzi" per la composizione. Dove va posizionato il soggetto principale?', options: ["Esattamente al centro dell'inquadratura", "Lungo le linee di intersezione della griglia", "Fuori fuoco in un angolo"], answer: 1 },
            "6": { category: "Videomaker", question: "Quando il videomaker sposta la macchina da presa orizzontalmente (da destra a sinistra o viceversa), fissa su un cavalletto che ruota sul proprio asse, cosa sta effettuando?", options: ["un Tilt", "uno Zoom", "una Carrellata", "una Panoramica"], answer: 3 },
            "7": { category: "Fotografia", question: "La temperatura colore della luce si misura in gradi _________", options: ["Kelvin", "Celsius", "Fahrenheit"], answer: 0 },
            "8": { category: "Game e VFX", question: "Qual è la tecnica che permette di catturare i movimenti di un attore reale per applicarli a un personaggio 3D (come Gollum o Avatar)?", options: ["Green Screen", "Motion Capture (MoCap)", "Stop Motion"], answer: 1 },
            "9": { category: "Game e VFX", question: "Il software di rendering e creazione giochi più usato al mondo (che si studia al Rossellini) è ________ Engine.", options: ["Unreal", "Fake", "Unlimited", "Game"], answer: 0 },
            "10": { category: "Cyber Security", question: 'Nel monitoraggio della sicurezza operativa (SOC), qual è l\'attività principale che permette di prevenire un attacco analizzando preventivamente i sistemi alla ricerca di "falle" o bug?', options: ["Governance e Compliance", "Vulnerability Assessment", "Backup dei dati"], answer: 1 },
            "11": { category: "Cyber Security", question: "Per proteggere una rete aziendale e bloccare il traffico non autorizzato proveniente dall'esterno (Internet), quale di questi strumenti è fondamentale installare?", options: ["Firewall", "Scanner per stampanti", "Un cavo HDMI placcato oro"], answer: 0 }
        };

        const KEYS = {
            "0": "dI19WusZw-",
            "1": "hyeNw8MK5w",
            "2": "GoEOj9ymSA",
            "3": "iyEDE_2nqI",
            "4": "EOq9YimV15",
            "5": "011RUvXjzj",
            "6": "Y7XZ6J6I5_",
            "7": "Qe2FA9SjU_",
            "8": "W82KdttFtx",
            "9": "hEMFSbK_pT",
            "10": "Ea331T88Rk",
            "11": "9hsjMI8_8b"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const pos = urlParams.get('pos');
        const key = urlParams.get('key');

        let selectedOption = null;

        function validaKey(position, token) {
            return KEYS[position] === token;
        }

        function getProgress() {
            return JSON.parse(localStorage.getItem(LS_KEY)) || {};
        }

        function salvaRisposta(position, corretta) {
            let progress = getProgress();
            progress[position] = corretta;
            localStorage.setItem(LS_KEY, JSON.stringify(progress));
        }

        function domandaGiaRisolta(position) {
            return getProgress().hasOwnProperty(position);
        }

        function mostraErrore() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            setTimeout(() => {
                window.location.replace(new URL('index.html', window.location.href).href);
            }, 3000);
        }

        function mostraDomanda() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';

            const quizData = QUIZ[pos];
            const qIndex = parseInt(pos) + 1;

            document.getElementById('category-tag').textContent = quizData.category;
            document.getElementById('q-num').textContent = qIndex;
            document.getElementById('q-total').textContent = TOTAL_QUESTIONS;
            document.getElementById('quiz-question').textContent = quizData.question;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            quizData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selezionaOpzione(idx, btn);
                grid.appendChild(btn);
            });
        }

        function selezionaOpzione(index, btnElement) {
            selectedOption = index;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('confirm-btn').classList.add('active');
            document.getElementById('feedback').style.display = 'none';
        }

        function confermaRisposta() {
            if (selectedOption === null) return;

            const quizData = QUIZ[pos];
            const feedback = document.getElementById('feedback');
            const confirmBtn = document.getElementById('confirm-btn');

            if (selectedOption === quizData.answer) {
                salvaRisposta(pos, true);
                document.querySelectorAll('.option-btn')[selectedOption].classList.add('correct');
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ Corretto! Vai alla dashboard per continuare.';
                feedback.style.display = 'block';
                confirmBtn.style.display = 'none';

                setTimeout(() => {
                    window.location.replace(new URL('index.html', window.location.href).href);
                }, 2000);
            } else {
                salvaRisposta(pos, false);
                document.querySelectorAll('.option-btn')[selectedOption].classList.add('wrong');
                feedback.className = 'feedback wrong';
                feedback.textContent = '❌ Risposta errata. Riprova!';
                feedback.style.display = 'block';
                selectedOption = null;
                confirmBtn.classList.remove('active');

                setTimeout(() => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.classList.remove('selected', 'wrong');
                    });
                    feedback.style.display = 'none';
                }, 1500);
            }
        }

        if (pos === null || key === null || !validaKey(pos, key)) {
            mostraErrore();
        } else {
            const posInt = parseInt(pos);
            if (isNaN(posInt) || posInt < 0 || posInt >= TOTAL_QUESTIONS) {
                mostraErrore();
            } else if (domandaGiaRisolta(pos)) {
                window.location.replace(new URL('index.html', window.location.href).href);
            } else {
                setTimeout(mostraDomanda, 600);
            }
        }
    </script>
</body>
</html>
