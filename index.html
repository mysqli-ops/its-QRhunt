<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Hunt - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0d0d1a 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00aeef, #662d91);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #888;
            font-size: 1rem;
        }

        .score-board {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .score-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 120px;
        }

        .score-item .score-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .score-item .score-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .score-item.correct .score-value { color: #00ff88; }
        .score-item.wrong .score-value { color: #ff4444; }
        .score-item.pending .score-value { color: #888; }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 1rem auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00aeef, #662d91);
            border-radius: 4px;
            transition: width 0.8s ease-out;
            box-shadow: 0 0 15px rgba(0, 174, 239, 0.4);
        }

        .progress-text {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #00aeef;
        }

        .threshold-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #666;
        }

        .threshold-info.reached {
            color: #00ff88;
            font-weight: bold;
        }

        #grid-domande {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 1rem;
            max-width: 600px;
            width: 100%;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .slot {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            padding: 0.5rem;
        }

        .slot.locked {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.2);
        }

        .slot.locked .slot-icon { font-size: 1.5rem; opacity: 0.5; }
        .slot.locked .slot-status { display: none; }

        .slot.correct {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 174, 239, 0.1));
            border: 2px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }

        .slot.wrong {
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.1), rgba(102, 45, 145, 0.1));
            border: 2px solid rgba(255, 68, 68, 0.4);
            color: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.15);
        }

        .slot.correct.last-found,
        .slot.wrong.last-found {
            animation: glowPulse 2s ease-in-out infinite;
        }

        .slot .slot-status {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .slot .slot-num {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            margin-top: 0.2rem;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .completion-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 174, 239, 0.05));
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .completion-message.show {
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        .completion-message h2 {
            font-size: 1.8rem;
            color: #00ff88;
            margin-bottom: 0.5rem;
        }

        .completion-message .score-final {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00aeef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
        }

        .completion-message .prize-text {
            font-size: 1.1rem;
            color: #fff;
            margin: 1rem 0;
            line-height: 1.5;
        }

                .qr-verify {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 1rem 0;
        }

        .debug-section {
            margin-top: 2rem;
            text-align: center;
        }

        .debug-section button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #666;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .debug-section button:hover {
            border-color: rgba(255,68,68,0.5);
            color: #ff4444;
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 1.8rem; }
            #grid-domande { grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
            .slot { font-size: 1.4rem; }
            .score-board { gap: 0.75rem; }
            .score-item { padding: 0.75rem 1rem; min-width: 100px; }
        }
    </style>
    <base target="_blank">

</head>
<body>
    <div class="header">
        <h1>🔍 ITS Hunt</h1>
        <p>Scansiona i QR code nascosti e rispondi alle domande!</p>

        <div class="score-board">
            <div class="score-item correct">
                <div class="score-label">Corrette</div>
                <div class="score-value" id="score-correct">0</div>
            </div>
            <div class="score-item wrong">
                <div class="score-label">Errate</div>
                <div class="score-value" id="score-wrong">0</div>
            </div>
            <div class="score-item pending">
                <div class="score-label">Rimanenti</div>
                <div class="score-value" id="score-pending">12</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 12 domande tentate</div>
        <div class="threshold-info" id="threshold-info">Obiettivo: 10 risposte corrette per vincere!</div>
    </div>

    <div id="grid-domande"></div>

    <div class="completion-message" id="completion-message">
        <h2>🎉 Complimenti!</h2>
        <div class="score-final" id="score-final">10/12</div>
        <p class="prize-text" id="prize-text">Hai raggiunto l'obiettivo! Mostra questo QR allo stand di Produzione per ritirare il gadget!</p>
        <div class="qr-verify" id="qr-verify"></div>
    </div>

    <div class="debug-section" id="debug-section" style="display:none;">
        <button onclick="resetProgress()">🗑️ Reset Progresso (Debug)</button>
    </div>

    <script>
        const LS_KEY = 'its_hunt_2026_openday';
        const SALT = "ITS2026OD";
        const TOTAL_QUESTIONS = 12;
        const WIN_THRESHOLD = 10;

        const QUIZ = {
            "0": { category: "Produzione" },
            "1": { category: "Produzione" },
            "2": { category: "Produzione" },
            "3": { category: "Sound" },
            "4": { category: "Sound" },
            "5": { category: "Videomaker" },
            "6": { category: "Videomaker" },
            "7": { category: "Fotografia" },
            "8": { category: "Game e VFX" },
            "9": { category: "Game e VFX" },
            "10": { category: "Cyber Security" },
            "11": { category: "Cyber Security" }
        };

        function getProgress() {
            const raw = JSON.parse(localStorage.getItem(LS_KEY)) || {};
            // Migra vecchio formato booleano al nuovo formato oggetto
            const migrated = {};
            for (const key in raw) {
                if (typeof raw[key] === 'boolean') {
                    migrated[key] = { correct: raw[key], attempts: raw[key] ? 1 : 1 };
                } else {
                    migrated[key] = raw[key];
                }
            }
            return migrated;
        }

        function toBase64Url(str) {
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function generateToken(progress) {
            const correctCount = Object.values(progress).filter(v => v && v.correct === true).length;
            const sortedKeys = Object.keys(progress).sort().join('');
            const payload = SALT + ':' + correctCount + ':' + sortedKeys;
            return toBase64Url(payload);
        }

        function renderGrid() {
            const grid = document.getElementById('grid-domande');
            const progress = getProgress();
            const attemptedCount = Object.keys(progress).length;
            const correctCount = Object.values(progress).filter(v => v && v.correct === true).length;
            const wrongCount = Object.values(progress).filter(v => v && v.correct === false).length;
            const pendingCount = TOTAL_QUESTIONS - attemptedCount;

            grid.innerHTML = '';

            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                const slot = document.createElement('div');
                const hasAnswer = progress.hasOwnProperty(i.toString());
                const entry = hasAnswer ? progress[i.toString()] : null;
                const isCorrect = hasAnswer && entry && entry.correct === true;
                const isWrong = hasAnswer && entry && entry.correct === false;

                let statusClass = 'locked';
                let icon = '🔒';
                let statusText = '';

                if (isCorrect) {
                    statusClass = 'correct';
                    icon = '✅';
                    statusText = 'OK';
                } else if (isWrong) {
                    statusClass = 'wrong';
                    icon = '❌';
                    statusText = 'NO';
                }

                slot.className = `slot ${statusClass}`;
                slot.id = `slot-${i}`;

                slot.innerHTML = `
                    <div class="slot-icon">${icon}</div>
                    <div class="slot-status">${statusText}</div>
                    <div class="slot-num">${i + 1}</div>
                `;

                grid.appendChild(slot);
            }

            // glowPulse sull'ultimo slot tentato
            const attemptedIndices = Object.keys(progress).map(Number).sort((a, b) => a - b);
            if (attemptedIndices.length > 0) {
                const lastIndex = attemptedIndices[attemptedIndices.length - 1];
                const lastSlot = document.getElementById(`slot-${lastIndex}`);
                if (lastSlot) lastSlot.classList.add('last-found');
            }

            // Aggiorna score board
            document.getElementById('score-correct').textContent = correctCount;
            document.getElementById('score-wrong').textContent = wrongCount;
            document.getElementById('score-pending').textContent = pendingCount;

            // Progress bar
            const percentage = (attemptedCount / TOTAL_QUESTIONS) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = 
                `${attemptedCount} / ${TOTAL_QUESTIONS} domande tentate`;

            // Threshold info
            const thresholdEl = document.getElementById('threshold-info');
            if (correctCount >= WIN_THRESHOLD) {
                thresholdEl.textContent = `🎯 Obiettivo raggiunto! ${correctCount}/${WIN_THRESHOLD} risposte corrette!`;
                thresholdEl.classList.add('reached');
            } else {
                thresholdEl.textContent = `Obiettivo: ${WIN_THRESHOLD} risposte corrette per vincere! (mancano ${WIN_THRESHOLD - correctCount})`;
                thresholdEl.classList.remove('reached');
            }

            // Completamento
            const msg = document.getElementById('completion-message');
            if (attemptedCount === TOTAL_QUESTIONS) {
                const hasWon = correctCount >= WIN_THRESHOLD;

                if (hasWon) {
                    msg.querySelector('h2').textContent = '🎉 Complimenti, hai vinto!';
                    document.getElementById('score-final').textContent = `${correctCount}/${TOTAL_QUESTIONS}`;
                    document.getElementById('prize-text').textContent = 
                        `Hai raggiunto le ${WIN_THRESHOLD} risposte corrette! Mostra questo QR allo stand di Produzione per ritirare il gadget!`;

                                        const qrContainer = document.getElementById('qr-verify');
                    qrContainer.innerHTML = '';

                    const token = generateToken(progress);
                    const verifyUrl = new URL('verify.html', window.location.href).href + '?token=' + token;

                    new QRCode(qrContainer, {
                        text: verifyUrl,
                        width: 180,
                        height: 180,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                } else {
                    msg.querySelector('h2').textContent = '😬 Ci sei quasi!';
                    document.getElementById('score-final').textContent = `${correctCount}/${TOTAL_QUESTIONS}`;
                    document.getElementById('prize-text').textContent = 
                        `Hai fatto ${correctCount} risposte corrette, ma ne servono ${WIN_THRESHOLD} per vincere il gadget. Riprova!`;
                }

                msg.classList.add('show');
            } else {
                msg.classList.remove('show');
            }
        }

        function resetProgress() {
            if (confirm('Sei sicuro di voler cancellare tutto il progresso?')) {
                localStorage.removeItem(LS_KEY);
                // FIX: location.reload() ripristina la BFCache su alcuni browser mobile
                // mostrando il vecchio stato anche dopo il reset del localStorage.
                // Il timestamp forza un fetch fresco e invalida lo snapshot in memoria.
                window.location.replace('index.html?t=' + Date.now());
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') renderGrid();
        });

        setInterval(renderGrid, 1000);

        // Mostra sezione debug solo con parametro ?debug=1
        const debugParams = new URLSearchParams(window.location.search);
        if (debugParams.get('debug') === '1') {
            document.getElementById('debug-section').style.display = 'block';
        }

        renderGrid();
    </script>
</body>
</html>
