<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Hunt - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0d0d1a 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00aeef, #662d91);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #888;
            font-size: 1rem;
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 1.5rem auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00aeef, #662d91);
            border-radius: 4px;
            transition: width 0.8s ease-out;
            box-shadow: 0 0 15px rgba(0, 174, 239, 0.4);
        }

        .progress-text {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #00aeef;
        }

        #grid-domande {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .slot {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .slot.locked {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .slot.locked::before {
            content: "🔒";
            font-size: 1.5rem;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .slot.locked .status-icon {
            display: none;
        }

        .slot.solved {
            background: linear-gradient(135deg, rgba(0, 174, 239, 0.15), rgba(102, 45, 145, 0.15));
            border: 2px solid rgba(0, 174, 239, 0.5);
            color: #00aeef;
            text-shadow: 0 0 20px rgba(0, 174, 239, 0.6);
            box-shadow: 
                0 0 30px rgba(0, 174, 239, 0.2),
                inset 0 0 20px rgba(0, 174, 239, 0.05);
        }

        .slot.solved.last-found {
            animation: glowPulse 2s ease-in-out infinite;
        }

        .slot.solved::before {
            display: none;
        }

        .slot.solved .status-icon {
            display: block;
            animation: iconPop 0.6s ease-out;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 174, 239, 0.2), inset 0 0 20px rgba(0, 174, 239, 0.05); }
            50% { box-shadow: 0 0 50px rgba(0, 174, 239, 0.4), inset 0 0 30px rgba(0, 174, 239, 0.1); }
        }

        @keyframes iconPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .completion-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 174, 239, 0.1), rgba(102, 45, 145, 0.1));
            border: 2px solid rgba(0, 174, 239, 0.3);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
        }

        .completion-message.show {
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        .completion-message h2 {
            font-size: 1.8rem;
            color: #00aeef;
            margin-bottom: 0.5rem;
        }

        .completion-message p {
            color: #ccc;
            margin-bottom: 1.5rem;
        }

        .qr-verify {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 0.5rem 0;
        }

        .completion-message .prize-text {
            font-size: 1.2rem;
            color: #00ff88;
            margin-top: 1rem;
            font-weight: bold;
        }

        .debug-section {
            margin-top: 2rem;
            text-align: center;
        }

        .debug-section button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #666;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .debug-section button:hover {
            border-color: rgba(255,68,68,0.5);
            color: #ff4444;
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 1.8rem; }
            .slot { width: 70px; height: 70px; font-size: 2rem; }
            #grid-domande { gap: 1rem; }
        }
    </style>
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🔍 ITS Hunt</h1>
        <p>Scansiona i QR code nascosti e rispondi alle domande!</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 5 domande risolte</div>
    </div>

    <div id="grid-domande"></div>

    <div class="completion-message" id="completion-message">
        <h2>🎉 Complimenti!</h2>
        <p>Hai risolto tutte le domande!</p>
        <div class="qr-verify" id="qr-verify"></div>
        <p class="prize-text">📱 Mostra questo QR al banchetto Prod per ritirare il gadget!</p>
    </div>

    <div class="debug-section">
        <button onclick="resetProgress()">🗑️ Reset Progresso (Debug)</button>
    </div>

    <script>
        const LS_KEY = 'its_hunt_2026_openday';
        const SALT = "ITS2026OD";

        const QUIZ = {
            "0": { question: "Anno fondazione ITS" },
            "1": { question: "Settore tecnologico" },
            "2": { question: "Sede principale" },
            "3": { question: "Significato ITS" },
            "4": { question: "Figura cinema" }
        };

        function getProgress() {
            return JSON.parse(localStorage.getItem(LS_KEY)) || {};
        }

        // Base64url encoding: sicuro per URL (no +, /, =)
        function toBase64Url(str) {
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function generateToken(progress) {
            const foundCount = Object.keys(progress).length;
            const sortedKeys = Object.keys(progress).sort().join('');
            const payload = SALT + ':' + foundCount + ':' + sortedKeys;
            return toBase64Url(payload);
        }

        function renderGrid() {
            const grid = document.getElementById('grid-domande');
            const progress = getProgress();
            const foundCount = Object.keys(progress).length;
            const totalQuestions = Object.keys(QUIZ).length;

            grid.innerHTML = '';

            for (let i = 0; i < totalQuestions; i++) {
                const slot = document.createElement('div');
                const isSolved = progress.hasOwnProperty(i.toString());

                slot.className = `slot ${isSolved ? 'solved' : 'locked'}`;
                slot.id = `slot-${i}`;

                const icon = document.createElement('span');
                icon.className = 'status-icon';
                icon.textContent = isSolved ? '✅' : '🔒';
                slot.appendChild(icon);

                grid.appendChild(slot);
            }

            // glowPulse solo sull'ultimo slot risolto
            const solvedIndices = Object.keys(progress)
                .map(Number)
                .sort((a, b) => a - b);

            if (solvedIndices.length > 0) {
                const lastIndex = solvedIndices[solvedIndices.length - 1];
                const lastSlot = document.getElementById(`slot-${lastIndex}`);
                if (lastSlot) lastSlot.classList.add('last-found');
            }

            const percentage = (foundCount / totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = 
                `${foundCount} / ${totalQuestions} domande risolte`;

            const msg = document.getElementById('completion-message');
            if (foundCount === totalQuestions) {
                msg.classList.add('show');

                const qrContainer = document.getElementById('qr-verify');
                qrContainer.innerHTML = '';

                const token = generateToken(progress);
                const verifyUrl = new URL('verify.html', window.location.href).href + '?token=' + token;

                new QRCode(qrContainer, {
                    text: verifyUrl,
                    width: 180,
                    height: 180,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
            } else {
                msg.classList.remove('show');
            }
        }

        function resetProgress() {
            if (confirm('Sei sicuro di voler cancellare tutto il progresso?')) {
                localStorage.removeItem(LS_KEY);
                location.reload();
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') renderGrid();
        });

        setInterval(renderGrid, 1000);

        renderGrid();
    </script>
</body>
</html>
