<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Hunt - Staff Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            text-align: center;
            transition: background 0.5s;
        }

        body.valid {
            background: linear-gradient(135deg, #0a2a1a 0%, #0d3d1f 50%, #0a2a1a 100%);
        }

        body.invalid {
            background: linear-gradient(135deg, #2a0a0a 0%, #3d0d0d 50%, #2a0a0a 100%);
        }

        body.used {
            background: linear-gradient(135deg, #2a1a00 0%, #3d2a0d 50%, #2a1a00 100%);
        }

        body.loading {
            background: #0a0a0a;
        }

        .container {
            padding: 2rem;
            max-width: 500px;
        }

        .icon { font-size: 5rem; margin-bottom: 1rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; opacity: 0.9; line-height: 1.5; }

        .details {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .stamp {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.5;
            font-family: monospace;
        }
    </style>
</head>
<body class="loading">
    <div class="container">
        <div class="icon" id="icon">⏳</div>
        <h1 id="title">Verifica in corso...</h1>
        <p id="message">Attendere prego</p>
        <div class="details" id="details" style="display:none;"></div>
        <div class="stamp" id="stamp"></div>
    </div>

    <script>
        const SALT = "ITS2026OD";
        const USED_TOKENS_KEY = 'its_hunt_claimed_rewards';
        const WIN_THRESHOLD = 10;
        const TOTAL_QUESTIONS = 12;

        function fromBase64Url(str) {
            const padding = 4 - (str.length % 4);
            let b64 = str;
            if (padding !== 4) b64 += '='.repeat(padding);
            b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
            return atob(b64);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function isTokenAlreadyUsed(t) {
            const used = JSON.parse(localStorage.getItem(USED_TOKENS_KEY)) || [];
            return used.includes(t);
        }

        function markTokenAsUsed(t) {
            const used = JSON.parse(localStorage.getItem(USED_TOKENS_KEY)) || [];
            used.push(t);
            localStorage.setItem(USED_TOKENS_KEY, JSON.stringify(used));
        }

        function verificaToken(t) {
            if (!t) return { valid: false, reason: 'Token mancante' };
            
            // Controllo anti-duplicato locale staff
            if (isTokenAlreadyUsed(t)) {
                return { valid: false, used: true, reason: 'GIA RISCATTATO' };
            }

            try {
                const decoded = fromBase64Url(t);
                const parts = decoded.split(':');

                if (parts.length !== 3) return { valid: false, reason: 'Formato non valido' };

                const [salt, count] = parts;

                if (salt !== SALT) return { valid: false, reason: 'Firma non valida' };

                const correctCount = parseInt(count);
                if (isNaN(correctCount) || correctCount < WIN_THRESHOLD) {
                    return {
                        valid: false,
                        reason: `Punteggio insufficiente (${count}/${WIN_THRESHOLD})`
                    };
                }

                return { valid: true, count: correctCount };
            } catch (e) {
                return { valid: false, reason: 'Errore decodifica' };
            }
        }

        function mostraRisultato(result) {
            const body = document.body;
            const icon = document.getElementById('icon');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            const details = document.getElementById('details');
            const stamp = document.getElementById('stamp');

            body.classList.remove('loading');

            if (result.valid) {
                body.classList.add('valid');
                icon.textContent = '✅';
                title.textContent = 'VALIDO: CONSEGNA GADGET';
                message.textContent = 'Il partecipante ha diritto al premio. Il sistema ha registrato questa scansione.';
                details.style.display = 'block';
                details.textContent = 'Punteggio: ' + result.count + '/' + TOTAL_QUESTIONS;
                
                // Registra il token come usato solo se la verifica è passata
                markTokenAsUsed(token);
            } else if (result.used) {
                body.classList.add('used');
                icon.textContent = '⚠️';
                title.textContent = 'GIA UTILIZZATO';
                message.textContent = 'Questo QR code è stato già presentato e validato in precedenza.';
                details.style.display = 'none';
            } else {
                body.classList.add('invalid');
                icon.textContent = '❌';
                title.textContent = 'NON VALIDO';
                message.textContent = 'Verifica fallita. Il partecipante non può ricevere il gadget.';
                details.style.display = 'block';
                details.textContent = 'Motivo: ' + result.reason;
            }

            stamp.textContent = 'ITS Hunt 2026 — Registro Stand Produzione';
        }

        // Delay per feedback visivo "caricamento"
        setTimeout(() => {
            const result = verificaToken(token);
            mostraRisultato(result);
        }, 800);
    </script>
</body>
</html>
